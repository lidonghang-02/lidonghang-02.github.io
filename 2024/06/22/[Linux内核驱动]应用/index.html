<h2 id="应用"><a href="#%E5%BA%94%E7%94%A8" class="headerlink" title="应用"></a>应用</h2>
<p>创建10个同样globalmem设备，都在同一个globalmem类中，可以在/sys/class/globalmem/下看到</p>
<p>每个设备都使用互斥锁mutex</p>
<p>实现基本的open,release,read,write,ioctl,llseek操作</p>
<p>使用一个4k大小的mem存储数据</p>
<h3 id="代码"><a href="#%E4%BB%A3%E7%A0%81" class="headerlink" title="代码"></a>代码</h3>
<h4 id="globalmem.c"><a href="#globalmem.c" class="headerlink" title="globalmem.c"></a>globalmem.c</h4>
<figure class="highlight c"><table><tr><td class="code"><pre><code class="hljs c">/*
* @Date: 2024-05-01 15:01:43
* @author: lidonghang-02 2426971102@qq.com
* @LastEditTime: 2024-05-19 20:06:13
*/
#include &lt;linux/init.h&gt;
#include &lt;linux/module.h&gt;
#include &lt;linux/cdev.h&gt;
#include &lt;linux/device.h&gt;
#include &lt;linux/fs.h&gt;
#include &lt;linux/uaccess.h&gt;
#include &lt;linux/slab.h&gt;

#include &quot;beep.h&quot;

// mem大小，4k
#define GLOBALMEM_SIZE 0x1000
// 设备数量，次设备号为0-9
#define DEVICE_NUM 10

static int major = 230;

// 设备类，在insmod设备后可以在/sys/class/下看到
struct class *class = NULL;
struct globalmem_dev
{
    struct cdev cdev;
    struct device *class_dev;
    struct mutex mutex;
    unsigned char mem[GLOBALMEM_SIZE];
};
struct globalmem_dev *globalmem_devp;

static int globalmem_open_func(struct inode *inode, struct file *filp)
{
    // container_of 是一个宏，用于根据一个包含某成员的结构体中的该成员的地址来获取整个结构体的地址。
    // 返回整个结构体的指针
    struct globalmem_dev *dev = container_of(inode-&gt;i_cdev, struct globalmem_dev, cdev);

    filp-&gt;private_data = dev;
    return 0;
}
static int globalmem_release_func(struct inode *inode, struct file *filp)
{
    return 0;
}

static long globalmem_ioctl_func(struct file *filp, unsigned int cmd, unsigned long arg)
{
    struct globalmem_dev *dev = filp-&gt;private_data;
    int ret = 0;

    // 检查命令类型
    if (_IOC_TYPE(cmd) != DEV_FIFO_TYPE)
    {
        pr_err(&quot;cmd %u,bad magic 0x%x/0x%x.\n&quot;, cmd, _IOC_TYPE(cmd), DEV_FIFO_TYPE);
        return -ENOTTY;
    }
// 检查命令方向，并验证用户空间指针的访问权限。
if (_IOC_DIR(cmd) &amp; _IOC_READ)
ret = !access_ok(VERIFY_WRITE, (void __user *)arg, _IOC_SIZE(cmd));
else if (_IOC_DIR(cmd) &amp; _IOC_WRITE)
ret = !access_ok(VERIFY_READ, (void __user *)arg, _IOC_SIZE(cmd));

if (ret)
return -EFAULT;

switch (cmd)
{
case DEV_FIFO_CLEAN:
    memset(dev-&gt;mem, 0, GLOBALMEM_SIZE);
    printk(KERN_INFO &quot;globalmem clear\n&quot;);
    break;

default:
    return -EINVAL;
}
return 0;
}

static ssize_t globalmem_read_func(struct file *filp, char __user *buf, size_t size, loff_t *ppos)
{
    unsigned long p = *ppos;
    unsigned long count = size;
    int ret = 0;
    struct globalmem_dev *dev = filp-&gt;private_data;

    if (p &gt;= GLOBALMEM_SIZE)
    return 0;
    if (count &gt; GLOBALMEM_SIZE - p)
    count = GLOBALMEM_SIZE - p;

    // 上锁
    mutex_lock(&amp;dev-&gt;mutex);
    if (copy_to_user(buf, dev-&gt;mem + p, count))
    ret = -EFAULT;
    else
    {
        *ppos += count;
        ret = count;
    }
// 解锁
mutex_unlock(&amp;dev-&gt;mutex);

return ret;
}

static ssize_t globalmem_write_func(struct file *filp, const char __user *buf, size_t size, loff_t *ppos)
{
    unsigned long p = *ppos;
    unsigned long count = size;
    int ret = 0;
    struct globalmem_dev *dev = filp-&gt;private_data;

    if (p &gt;= GLOBALMEM_SIZE)
    return -ENOMEM;
    if (count &gt; GLOBALMEM_SIZE - p)
    count = GLOBALMEM_SIZE - p;

    mutex_lock(&amp;dev-&gt;mutex);
    if (copy_from_user(dev-&gt;mem + p, buf, count))
    ret = -EFAULT;
    else
    {
        *ppos += count;
        ret = count;
    }
mutex_unlock(&amp;dev-&gt;mutex);

return ret;
}

// 更改打开文件的文件偏移量
// SEEK_SET：文件的开始处--0
// SEEK_CUR：文件的当前位置--1
// SEEK_END：文件的结束处--2

static loff_t globalmem_llseek_func(struct file *filp, loff_t offset, int orig)
{
    loff_t ret = 0;
    switch (orig)
    {
    case 0:
        if (offset &lt; 0)
        {
            ret = -EINVAL;
            break;
        }
    if ((unsigned int)offset &gt; GLOBALMEM_SIZE)
    {
        ret = -EINVAL;
        break;
    }
filp-&gt;f_pos = (unsigned int)offset;
ret = filp-&gt;f_pos;
break;
case 1:
    if ((filp-&gt;f_pos + offset) &gt; GLOBALMEM_SIZE)
    {
        ret = -EINVAL;
        break;
    }
if ((filp-&gt;f_pos + offset) &lt; 0)
{
    ret = -EINVAL;
    break;
}
filp-&gt;f_pos += offset;
ret = filp-&gt;f_pos;
break;
case 2:
    if (offset &gt; 0)
    {
        ret = -EINVAL;
        break;
    }
if ((GLOBALMEM_SIZE + offset) &lt; 0)
{
    ret = -EINVAL;
    break;
}
filp-&gt;f_pos = GLOBALMEM_SIZE + offset;
ret = filp-&gt;f_pos;
break;

default:
    ret = -EINVAL;
    break;
}
return ret;
}

static const struct file_operations globalmem_fops = {
    .owner = THIS_MODULE,
    .open = globalmem_open_func,
    .release = globalmem_release_func,
    .unlocked_ioctl = globalmem_ioctl_func,
    .read = globalmem_read_func,
    .write = globalmem_write_func,
    .llseek = globalmem_llseek_func,
};
static void globalmem_setup(struct globalmem_dev *dev, int index)
{
    // 获取设备号
    int err, devno = MKDEV(major, index);

    cdev_init(&amp;dev-&gt;cdev, &amp;globalmem_fops);
    dev-&gt;cdev.owner = THIS_MODULE;
    err = cdev_add(&amp;dev-&gt;cdev, devno, 1);
    if (err)
    printk(KERN_NOTICE &quot;Error %d adding globalmem%d&quot;, err, index);
    else
    {

        dev-&gt;class_dev = NULL;
        dev-&gt;class_dev = device_create(class, NULL, devno, NULL, &quot;globalmem%d&quot;, index);
        if (IS_ERR(dev-&gt;class_dev))
        {
            printk(KERN_NOTICE &quot;Error creating device for globalmem%d&quot;, index);
        }
    // 初始化互斥锁
    mutex_init(&amp;dev-&gt;mutex);
}
}
static int __init globalmem_init_module(void)
{
    int ret = 0;
    dev_t devno = MKDEV(major, 0);
    int i;

    // 注册设备号
    if (major)
    ret = register_chrdev_region(devno, DEVICE_NUM, &quot;globalmem&quot;);
    else
    {
        ret = alloc_chrdev_region(&amp;devno, 0, DEVICE_NUM, &quot;globalmem&quot;);
        major = MAJOR(devno);
    }

if (ret &lt; 0)
return ret;

// 分配DEVICE_NUM个内存
globalmem_devp = kzalloc(sizeof(struct globalmem_dev) * DEVICE_NUM, GFP_KERNEL);
if (!globalmem_devp)
{
    ret = -ENOMEM;
    goto out_err_1;
}
// 创建一个类
class = class_create(THIS_MODULE, &quot;globalmem&quot;);
if (IS_ERR(class))
{
    printk(KERN_NOTICE &quot;Error creating class for globalmem&quot;);
    goto out_err_2;
}

// 初始化globalmem_devp数组
// globalmem_devp + i = globalmem_devp + i * sizeof(struct globalmem_dev)
// C语言中，指针算术是自动根据指针指向的数据类型来调整的，不需要显示指出
for (i = 0; i &lt; DEVICE_NUM; i++)
globalmem_setup(globalmem_devp + i, i);

printk(&quot;globalmem module init\n&quot;);
return 0;
out_err_2:
kfree(globalmem_devp);
out_err_1:
unregister_chrdev_region(devno, DEVICE_NUM);
return ret;
}

static void __exit globalmem_exit_module(void)
{
    int i;
    for (i = 0; i &lt; DEVICE_NUM; i++)
    {
        device_destroy(class, MKDEV(major, i));
        cdev_del(&amp;globalmem_devp[i].cdev);
    }
class_destroy(class);

kfree(globalmem_devp);
unregister_chrdev_region(MKDEV(major, 0), DEVICE_NUM);
printk(KERN_INFO &quot;globalmem module exit\n&quot;);
}

module_param(major, int, S_IRUGO);

module_init(globalmem_init_module);
module_exit(globalmem_exit_module);

MODULE_AUTHOR(&quot;lidonghang-02&quot;);
MODULE_LICENSE(&quot;GPL&quot;);</code></pre></td></tr></table></figure>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/tocbot/4.20.1/tocbot.min.js', function() {
    var toc = jQuery('#toc');
    if (toc.length === 0 || !window.tocbot) { return; }
    var boardCtn = jQuery('#board-ctn');
    var boardTop = boardCtn.offset().top;

    window.tocbot.init(Object.assign({
      tocSelector     : '#toc-body',
      contentSelector : '.markdown-body',
      linkClass       : 'tocbot-link',
      activeLinkClass : 'tocbot-active-link',
      listClass       : 'tocbot-list',
      isCollapsedClass: 'tocbot-is-collapsed',
      collapsibleClass: 'tocbot-is-collapsible',
      scrollSmooth    : true,
      includeTitleTags: true,
      headingsOffset  : -boardTop,
    }, CONFIG.toc));
    if (toc.find('.toc-list-item').length > 0) {
      toc.css('visibility', 'visible');
    }

    Fluid.events.registerRefreshCallback(function() {
      if ('tocbot' in window) {
        tocbot.refresh();
        var toc = jQuery('#toc');
        if (toc.length === 0 || !tocbot) {
          return;
        }
        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
  });
</script>

<script>
  Fluid.utils.createScript('https://lib.baomitu.com/anchor-js/4.3.1/anchor.min.js', function() {
    window.anchors.options = {
      placement: CONFIG.anchorjs.placement,
      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {
      window.anchors.options.icon = CONFIG.anchorjs.icon;
    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));

    Fluid.events.registerRefreshCallback(function() {
      if ('anchors' in window) {
        anchors.removeAll();
        var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
        var res = [];
        for (var item of el) {
          res.push('.markdown-body > ' + item.trim());
        }
        if (CONFIG.anchorjs.placement === 'left') {
          anchors.options.class = 'anchorjs-link-left';
        }
        anchors.add(res.join(', '));
      }
    });
  });
</script>
