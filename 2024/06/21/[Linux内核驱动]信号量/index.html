<h2 id="信号量"><a href="#%E4%BF%A1%E5%8F%B7%E9%87%8F" class="headerlink" title="信号量"></a>信号量</h2>
<p>更多详细内容在我的github中</p>
<p>对应操作系统中的经典概念PV操作，信号量的值可以是0、1或n。</p>
<h3 id="使用"><a href="#%E4%BD%BF%E7%94%A8" class="headerlink" title="使用"></a>使用</h3>
<figure class="highlight c"><table><tr><td class="code"><pre><code class="hljs c">#include &lt;linux/semaphore.h&gt;

// 定义
struct semaphore sem;

// 初始化信号量sem的值为val
sema_init(&amp;sem, int val);

// 获得信号量
// 会导致当前进程睡眠，不能被信号打断
down(&amp;sem);
// 会导致当前进程睡眠，可被信号打断
down_interruptible(&amp;sem);

// 释放
up(&amp;sem);</code></pre></td></tr></table></figure>
<h3 id="运行"><a href="#%E8%BF%90%E8%A1%8C" class="headerlink" title="运行"></a>运行</h3>
<figure class="highlight c"><table><tr><td class="code"><pre><code class="hljs c">make
insmod semaphore.ko

gcc test.c -o test
./test

// 另外开启一个终端
cat /dev/sem_dev
// 会发现只有当test结束后，才会输出内容</code></pre></td></tr></table></figure>
<h3 id="互斥锁"><a href="#%E4%BA%92%E6%96%A5%E9%94%81" class="headerlink" title="互斥锁"></a>互斥锁</h3>
<p>与信号量类似，但是互斥锁的值只能是0或1。</p>
<figure class="highlight c"><table><tr><td class="code"><pre><code class="hljs c">#include &lt;linux/mutex.h&gt;

// 声明
struct mutex lock;

// 初始化
mutex_init(&amp;lock);

// 获取互斥锁
mutex_lock(&amp;lock);
mutex_lock_interruptible(&amp;lock);
// 尝试获取互斥锁，失败时不会引起睡眠
mutex_trylock(&amp;lock);

// 释放
mutex_unlock(&amp;lock);/*
* @Date: 2024-05-01 09:44:20
* @author: lidonghang-02 2426971102@qq.com
* @LastEditTime: 2024-05-19 19:55:47
*/
#include &lt;linux/init.h&gt;
#include &lt;linux/module.h&gt;
#include &lt;linux/cdev.h&gt;
#include &lt;linux/kdev_t.h&gt;
#include &lt;linux/slab.h&gt;
#include &lt;linux/semaphore.h&gt;
#include &lt;linux/fs.h&gt;
#include &lt;linux/uaccess.h&gt;
#include &lt;linux/device.h&gt;

#define SEM_SIZE 0x1000
#define MEM_CLEAR 0x1
#define SEM_MAJOR 230

static int major = 230;
static int minor = 0;
struct semaphore ops_sem;

struct sem_dev
{
    struct cdev cdev;
    struct class* cls;
    struct device* class_dev;
    struct semaphore sem;
    unsigned char mem[SEM_SIZE];
};

struct sem_dev* sem_devp;

static int sem_open_func(struct inode* inode, struct file* filp)
{

    if (down_interruptible(&amp;ops_sem) != 0)
    return -ERESTARTSYS;
    filp-&gt;private_data = sem_devp;
    return 0;
}

static int sem_release_func(struct inode* inode, struct file* filp)
{
    up(&amp;ops_sem);
    return 0;
}

static long sem_ioctl_func(struct file* filp, unsigned int cmd, unsigned long arg)
{
    struct sem_dev* dev = filp-&gt;private_data;
    switch (cmd)
    {
    case MEM_CLEAR:
        memset(dev-&gt;mem, 0, SEM_SIZE);
        printk(KERN_INFO &quot;Memory cleared\n&quot;);
        break;
    default:
        return -ENOTTY;
    }
return 0;
}

static ssize_t sem_read_func(struct file* filp, char __user* buf, size_t size, loff_t* ppos)
{
    unsigned long p = *ppos;
    unsigned int count = size;
    int ret = 0;
    struct sem_dev* dev = filp-&gt;private_data;

    if (p &gt;= SEM_SIZE)
    return 0;
    if (count &gt; SEM_SIZE - p)
    count = SEM_SIZE - p;

    // 获取信号量，可以被信号打断，这时候返回非0
    if (down_interruptible(&amp;dev-&gt;sem) != 0)
    return -ERESTARTSYS;

    if (copy_to_user(buf, dev-&gt;mem + p, count))
    ret = -EFAULT;
    else
    {
        *ppos += count;
        ret = count;
        printk(KERN_INFO &quot;read %u bytes from %lu\n&quot;, count, p);
    }
up(&amp;dev-&gt;sem);
return ret;
}

static ssize_t sem_write_func(struct file* filp, const char __user* buf, size_t size, loff_t* ppos)
{
    unsigned long p = *ppos;
    unsigned int count = size;
    int ret = 0;
    struct sem_dev* dev = filp-&gt;private_data;

    if (p &gt;= SEM_SIZE)
    return -ENOMEM;
    if (count &gt; SEM_SIZE - p)
    count = SEM_SIZE - p;

    if (down_interruptible(&amp;dev-&gt;sem) != 0)
    return -ERESTARTSYS;

    if (copy_from_user(dev-&gt;mem + p, buf, count))
    ret = -EFAULT;
    else
    {
        ret = count;
        printk(KERN_INFO &quot;wrote %u bytes to %lu\n&quot;, count, p);
    }
up(&amp;dev-&gt;sem);
return ret;
}

static struct file_operations sem_ops =
{
    .owner = THIS_MODULE,
    .open = sem_open_func,
    .release = sem_release_func,
    .unlocked_ioctl = sem_ioctl_func,
    .read = sem_read_func,
    .write = sem_write_func,
};

static int __init sem_init_module(void)
{
    int ret = 0;
    dev_t devno = MKDEV(major, minor);
    printk(KERN_INFO &quot;Semaphore init\n&quot;);

    if (major)
    ret = register_chrdev_region(devno, 1, &quot;sem&quot;);
    else
    {
        ret = alloc_chrdev_region(&amp;devno, minor, 1, &quot;sem&quot;);
        major = MAJOR(devno);
    }
if (ret &lt; 0)
return ret;

sem_devp = kzalloc(sizeof(struct sem_dev), GFP_KERNEL);
if (!sem_devp)
{
    ret = -ENOMEM;
    goto out_err_1;
}
cdev_init(&amp;sem_devp-&gt;cdev, &amp;sem_ops);
sem_devp-&gt;cdev.owner = THIS_MODULE;
if (cdev_add(&amp;sem_devp-&gt;cdev, devno, 1))
{
    printk(KERN_ERR &quot;cdev_add failed\n&quot;);
    ret = -ENOMEM;
    goto out_err_1;
}

sem_devp-&gt;cls = class_create(THIS_MODULE, &quot;sem_cls&quot;);
if (IS_ERR(sem_devp-&gt;cls))
{
    printk(KERN_ERR &quot;class_create failed\n&quot;);
    ret = PTR_ERR(sem_devp-&gt;cls);
    goto out_err_1;
}

sem_devp-&gt;class_dev = device_create(sem_devp-&gt;cls, NULL, devno, NULL, &quot;sem_dev&quot;);
if (IS_ERR(sem_devp-&gt;class_dev))
{
    printk(KERN_ERR &quot;device_create failed\n&quot;);
    ret = PTR_ERR(sem_devp-&gt;class_dev);
    goto out_err_2;
}
sema_init(&amp;sem_devp-&gt;sem, 1);

sema_init(&amp;ops_sem, 1);
return 0;

out_err_2:
class_destroy(sem_devp-&gt;cls);
out_err_1:
unregister_chrdev_region(devno, 1);
return ret;
}

static void __exit sem_exit_module(void)
{
    printk(KERN_INFO &quot;Semaphore exit\n&quot;);
    device_destroy(sem_devp-&gt;cls, MKDEV(major, minor));
    class_destroy(sem_devp-&gt;cls);
    kfree(sem_devp);
    unregister_chrdev_region(MKDEV(major, minor), 1);
}

module_param(major, int, S_IRUGO);

module_init(sem_init_module);
module_exit(sem_exit_module);

MODULE_AUTHOR(&quot;lidonghang-02&quot;);
MODULE_LICENSE(&quot;GPL&quot;);</code></pre></td></tr></table></figure>

        if (toc.find('.toc-list-item').length > 0) {
          toc.css('visibility', 'visible');
        }
      }
    });
